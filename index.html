<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Saib Hossain - AI Researcher specializing in medical imaging, lung cancer screening, and generative AI"/>
  <meta name="theme-color" content="#0a0a1a"/>
  
  <title>Saib Hossain | AI Research Portfolio</title>
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Critical CSS Inline -->
  <style>
    :root{--bg:#0a0a1a;--surface:rgba(30,30,60,0.7);--primary:#6366f1;--accent:#06b6d4;--text:#e2e8f0;--text-muted:#94a3b8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
    .skip-link{position:absolute;left:-999px;top:auto;width:1px;height:1px;overflow:hidden}
    .skip-link:focus{left:1rem;top:1rem;width:auto;height:auto;padding:0.75rem 1.5rem;background:var(--primary);color:#fff;z-index:10000;border-radius:10px;font-weight:600}
    .container{max-width:1200px;margin:0 auto;padding:0 2rem}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
  
  <!-- Shared CSS -->
  <link rel="stylesheet" href="assets/css/base.css"/>
  <link rel="stylesheet" href="assets/css/components.css"/>
  <link rel="stylesheet" href="assets/css/layout.css"/>
  <link rel="stylesheet" href="assets/css/animations.css"/>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg"/>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  
  <!-- Header Placeholder (loaded via JS) -->
  <header id="header-placeholder"></header>
  
  <main id="main">
    <!-- Hero Section -->
    <section class="hero section">
      <div class="container hero-grid">
        <div class="hero-content fade-in-up">
          <h1 class="hero-title">
            <span class="gradient-text" id="hero-name">Saib Hossain</span>
          </h1>
          <p class="hero-subtitle" id="hero-title">AI Researcher | Medical Imaging</p>
          <p class="hero-bio" id="hero-bio">Building Agentic AI systems for lung cancer screening using deep learning on CT imaging.</p>
          
          <div class="hero-actions">
            <a href="pages/projects/index.html" class="btn btn-primary">View Projects</a>
            <a href="pages/contact/index.html" class="btn btn-outline">Get in Touch</a>
          </div>
          <span id="status-badge" class="status-badge"></span>
        </div>
        
        <div class="hero-image fade-in-up delay-1">
          <div class="profile-glow float">
            <picture>
              <source srcset="assets/images/photo.jpg" type="image/webp">
              <img src="assets/images/profile.jpg" alt="Saib Hossain" class="profile-pic" width="280" height="280" loading="eager"/>
            </picture>
          </div>
        </div>
      </div>
    </section>
    
    <!-- Quick Links Section -->
    <section class="section">
      <div class="container">
        <h2 class="section-title fade-in-up">Explore</h2>
        <div class="quick-links-grid" id="quick-links">
          <!-- Populated from global.json -->
        </div>
      </div>
    </section>
    
    <!-- Connect Section -->
    <section class="section">
      <div class="container">
        <h2 class="section-title fade-in-up">Connect</h2>
        <div class="links-grid" id="links-container">
          <!-- Populated from global.json -->
        </div>
      </div>
    </section>
  </main>
  
  <!-- Footer Placeholder (loaded via JS) -->
  <footer id="footer-placeholder"></footer>
  
  <!-- Shared JS -->
  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/utils.js"></script>
  <script src="assets/js/core/nav.js"></script>
  <script src="assets/js/components/links.js"></script>
  
  <!-- Home Page Script -->
    <!-- Home Page Script -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Load global data and store globally for footer use
      const globalData = await fetchJSON('global.json');
      if (!globalData) {
        console.warn('Could not load global.json');
        return;
      }
      
      // Store globally so footer script can access it
      window.__globalData = globalData;
      
      // Populate hero section
      if (globalData.meta) {
        setText('hero-name', globalData.meta.name);
        setText('hero-title', globalData.meta.title);
        setText('hero-bio', globalData.meta.bio || 'Building impactful AI solutions.');
        
        const badge = document.getElementById('status-badge');
        if (badge && globalData.meta.status) {
          badge.textContent = globalData.meta.status;
          badge.style.display = 'inline-flex';
        }
      }
      
      // Render quick links
      if (globalData.quickLinks) {
        const container = document.getElementById('quick-links');
        globalData.quickLinks.forEach((link, i) => {
          const card = document.createElement('a');
          card.href = link.href;
          card.className = 'quick-link-card glass-card fade-in-up';
          card.style.animationDelay = `${i * 0.05}s`;
          card.innerHTML = `
            <div class="quick-link-icon">${link.icon || '🔗'}</div>
            <div class="quick-link-content">
              <h4>${link.label}</h4>
              <p class="text-muted">${link.desc || ''}</p>
            </div>
          `;
          container.appendChild(card);
        });
      }
      
      // Render connect links in main content
      if (globalData.links) {
        renderLinksGrid('links-container', globalData.links);
        // Also render in footer (nav.js will call this after footer loads)
        renderFooterLinks('footer-links', globalData.links);
      }
      
      // Initialize scroll animations
      if (typeof initScrollAnimations === 'function') {
        initScrollAnimations('.fade-in-up');
      }
    });
  </script>
</body>
</html>
