<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saib Hossain - Portfolio CV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container fade-in">
    <header class="header">
      <div class="header-text">
        <h1 id="user-name"></h1>
        <div class="contact-info" id="contact-info">
          </div>
      </div>
      <img id="profile-pic" src="" alt="Profile Picture" class="profile-pic">
    </header>

    <section class="section slide-up">
      <h2><i class="fas fa-bullseye"></i> Career Objective</h2>
      <p id="objective-text"></p>
    </section>
    
    <section class="section slide-up delay-1">
      <h2><i class="fas fa-microscope"></i> Research & Experience</h2>
      <div id="research-container">
        </div>
    </section>

    <section class="section slide-up delay-1">
      <h2><i class="fas fa-code-branch"></i> Projects</h2>
      <div id="projects-container">
        </div>
    </section>

    <section class="section slide-up delay-2">
      <h2><i class="fas fa-certificate"></i> Certifications & Training</h2>
      <div id="certs-container">
        </div>
    </section>

    <section class="section slide-up delay-3">
      <h2><i class="fas fa-laptop-code"></i> Skills</h2>
      <div class="skills-grid" id="skills-container">
        </div>
    </section>

    <section class="section slide-up delay-4">
      <h2><i class="fas fa-trophy"></i> Achievements</h2>
      <ul class="styled-list" id="achievements-container">
        </ul>
    </section>

    <section class="section slide-up delay-4">
      <h2><i class="fas fa-graduation-cap"></i> Education</h2>
      <ul class="styled-list" id="education-container">
        </ul>
    </section>

    <section class="section slide-up delay-5">
      <h2><i class="fas fa-users"></i> Extra-Curricular Activities</h2>
      <div id="extra-container">
        </div>
    </section>

    <section class="section slide-up delay-5">
      <h2><i class="fas fa-language"></i> Languages</h2>
      <div class="language-grid" id="languages-container">
        </div>
    </section>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
